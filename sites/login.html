<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Pizzarella - Login</title>
  </head>
  <body>
    <!-- Header laden -->
    <div id="header"></div>

    <main>
      <section class="section-login">
        <header>Login</header>

        <div class="login">
          <!-- Hier erscheinen Fehlermeldungen -->
          <p class="needlogin-msg" id="login-msg"></p>

          <!-- Login Formular -->
          <form class="login-form" id="login-form">
            <div class="input-box-login">
              <label for="email">E-Mail-Adresse</label>
              <input type="email" id="email" required />
            </div>

            <div class="input-box-login">
              <label for="password">Passwort</label>
              <input type="password" id="password" required />
            </div>

            <button class="btn-form" type="submit">Anmelden</button>

            <p>Noch kein Konto?</p>
            <a class="btn-form" href="register.html">Als Gast registrieren</a>
            <a class="btn-form" href="register_admin.html"
              >Als Admin registrieren</a
            >
          </form>
        </div>
      </section>
    </main>

    <!-- Footer laden -->
    <div id="footer"></div>

    <!-- JS einbinden -->
    <script src="../includes/login.js"></script>
    <script>
      // === HEADER laden ===
      fetch("../includes/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          // Header.js nach dem Einfügen ausführen
          const script = document.createElement("script");
          script.src = "../includes/header.js";
          document.body.appendChild(script);
        });

      // === FOOTER laden ===
      fetch("../includes/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
  </body>
</html>
