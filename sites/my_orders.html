<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Meine Bestellungen</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/general.css" />

    <script defer src="../includes/my_orders.js"></script>
  </head>
  <body>
    <header>
      <h1 class="heading-orders">Meine Bestellungen</h1>
    </header>

    <div class="account-container">
      <div id="orders-container"></div>
    </div>
    <script>
      fetch("../includes/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.body.insertAdjacentHTML("afterbegin", data); // Header einfügen
          const script = document.createElement("script");
          script.src = "../includes/header.js";
          document.body.appendChild(script);
        });

      fetch("../includes/footer.html")
        .then((res) => res.text())
        .then((data) => {
          const footerDiv = document.createElement("div");
          footerDiv.innerHTML = data;
          document.body.appendChild(footerDiv); // Footer einfügen
        });
    </script>
  </body>
</html>
