<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alle Bestellungen</title>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <div id="header"></div>

    <main>
      <div class="admin-orders-container">
        <h1>Alle Bestellungen</h1>
        <div id="orders-list"></div>
      </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
      // === Header & Footer laden ===
      fetch("../includes/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;
          const script = document.createElement("script");
          script.src = "../includes/header.js";
          document.body.appendChild(script);
        });

      fetch("../includes/footer.html")
        .then((res) => res.text())
        .then((data) => (document.getElementById("footer").innerHTML = data));

      // === Prüfen ob Admin angemeldet ist ===
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (!currentUser || currentUser.role !== "admin") {
        alert("Nur Admins dürfen auf diese Seite!");
        window.location.href = "../index.html";
      }

      // === Bestellungen aus LocalStorage laden ===
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const orders = JSON.parse(localStorage.getItem("orders")) || [];

      const ordersList = document.getElementById("orders-list");

      if (orders.length === 0) {
        ordersList.innerHTML = "<p>Keine Bestellungen vorhanden.</p>";
      } else {
        orders.reverse().forEach((order, index) => {
          const user = users.find((u) => u.email === order.userEmail) || {
            firstName: "Unbekannt",
            lastName: "",
            email: order.userEmail,
          };

          let itemsHTML = order.items
            .map(
              (item) => `
        <tr>
          <td>${item.pizza_name}</td>
          <td>${item.size_name}</td>
          <td>${item.note}</td>
          <td>${item.quantity}</td>
          <td>${item.unit_price.toFixed(2)} €</td>
        </tr>
      `,
            )
            .join("");

          const orderHTML = `
        <div class="order-block">
          <h2>Bestellung #${index + 1}</h2>
          <p><strong>Kunde:</strong> ${user.firstName} ${user.lastName}</p>
          <p><strong>E-Mail:</strong> ${user.email}</p>
          <p><strong>Gesamtpreis:</strong> ${order.items.reduce((sum, i) => sum + i.unit_price * i.quantity, 0).toFixed(2)} €</p>
          
          <table>
            <thead>
              <tr>
                <th>Pizza</th>
                <th>Größe</th>
                <th>Anmerkung</th>
                <th>Menge</th>
                <th>Preis</th>
              </tr>
            </thead>
            <tbody>
              ${itemsHTML}
            </tbody>
          </table>
        </div>
      `;
          ordersList.innerHTML += orderHTML;
        });
      }
    </script>
  </body>
</html>
